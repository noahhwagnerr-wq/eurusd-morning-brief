name: Update Live Data

on:
  schedule:
    # Täglich 05:50 UTC = 07:50 CEST (Mo–Fr)
    - cron: "50 5 * * 1-5"
    # Samstag 08:00 UTC für Wochenend-Update
    - cron: "0 8 * * 6"
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund für manuelles Update (optional)'
        required: false
        default: 'Manuell ausgelöst'

env:
  PYTHONUNBUFFERED: "1"

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: update-data
      cancel-in-progress: false

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Dependencies installieren
        run: pip install requests python-dotenv

      - name: Daten holen (fetch_data.py)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python fetch_data.py
          echo "data.json Inhalt (erste 50 Zeilen):"
          head -50 data.json

      - name: data.json committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen in data.json."
          else
            git commit -m "data: live update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ data.json gepusht"
          fi

      - name: Job Summary
        if: always()
        run: |
          echo "## 📊 Live Data Update" >> $GITHUB_STEP_SUMMARY
          echo "**Zeitpunkt:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data.json ]; then
            echo "✅ data.json erfolgreich generiert" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -30 data.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ data.json fehlt" >> $GITHUB_STEP_SUMMARY
          fi
