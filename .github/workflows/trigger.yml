name: Trigger Morning Brief

# =====================================================================
#  trigger.yml  –  Automatischer Auslöser für den Morning Brief
#
#  Warum ein separater Trigger-Workflow?
#  ───────────────────────────────────────────────────────────
#  1. morning-brief.yml läuft automatisch Mo–Fr (cron).
#     Am Wochenende gibt es keinen automatischen Lauf.
#  2. Dieser Workflow ergänzt:
#     a) Sa+So 07:50 CEST  → weekend_brief (ohne debug)
#     b) Manuell jederzeit → workflow_dispatch mit debug_cot-Option
#     c) Ersatz-Trigger: Falls morning-brief.yml durch GitHub-Throttling
#        ausgelassen wurde, läuft dieser Workflow später erneut.
#
#  Funktionsweise:
#  Ruft den Haupt-Workflow via GitHub REST API (workflow_dispatch)
#  auf – das vermeidet Code-Duplikation und nutzt denselben
#  validierten Ablauf inkl. Retry + Datenprüfung.
# =====================================================================

on:
  schedule:
    # Sa + So 05:55 UTC = 07:55 CEST
    - cron: "55 5 * * 0,6"
    # Mo–Fr 06:20 UTC = 08:20 CEST (Backup falls 05:50-Lauf fehlt)
    - cron: "20 6 * * 1-5"
  workflow_dispatch:
    inputs:
      debug_cot:
        description: 'COT-Diagnose zusätzlich ausführen'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      reason:
        description: 'Grund für manuellen Trigger (optional, nur für Logs)'
        required: false
        default: 'Manuell'
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Trigger Morning Brief Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEBUG_COT="${{ github.event.inputs.debug_cot || 'false' }}"
          REASON="${{ github.event.inputs.reason || 'Automatisch (Wochenende/Backup)' }}"
          NOW=$(date -u '+%d.%m.%Y %H:%M UTC')

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Trigger Morning Brief"
          echo "  Zeit:      $NOW"
          echo "  Grund:     $REASON"
          echo "  debug_cot: $DEBUG_COT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # GitHub REST API: workflow_dispatch
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/noahhwagnerr-wq/eurusd-morning-brief/actions/workflows/morning-brief.yml/dispatches" \
            -d "{\"ref\": \"main\", \"inputs\": {\"debug_cot\": \"$DEBUG_COT\"}}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Morning Brief Workflow erfolgreich getriggert!"
            echo ""
            echo "  → Lauf startet in ~10 Sekunden"
            echo "  → Status: https://github.com/noahhwagnerr-wq/eurusd-morning-brief/actions"
          else
            echo "::error::Trigger fehlgeschlagen (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

      - name: Job Summary
        if: always()
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          DEBUG="${{ github.event.inputs.debug_cot || 'false' }}"
          EVENT="${{ github.event_name }}"
          REASON="${{ github.event.inputs.reason || 'Automatisch' }}"

          echo "## ⏰ Morning Brief Trigger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feld | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Zeit | \`$NOW\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Event | \`$EVENT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Grund | $REASON |" >> $GITHUB_STEP_SUMMARY
          echo "| debug_cot | \`$DEBUG\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "→ [Morning Brief Workflow überwachen](https://github.com/noahhwagnerr-wq/eurusd-morning-brief/actions/workflows/morning-brief.yml)" >> $GITHUB_STEP_SUMMARY
