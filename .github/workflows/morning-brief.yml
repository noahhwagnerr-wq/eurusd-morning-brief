name: EUR/USD Morning Brief

on:
  schedule:
    # 05:50 UTC = 07:50 CEST (Sommerzeit) / 06:50 MEZ (Winterzeit)
    # Etwas früher als 08:00 um API-Latenzen einzurechnen
    - cron: "50 5 * * 1-5"
  workflow_dispatch:  # Manueller Testlauf jederzeit möglich

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"   # Logs sofort sichtbar, kein Buffering

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      # ── 1. Secrets prüfen – sofort abbrechen wenn etwas fehlt ──
      - name: Secrets pruefen
        run: |
          MISSING=""
          [ -z "$TELEGRAM_BOT_TOKEN" ] && MISSING="$MISSING TELEGRAM_BOT_TOKEN"
          [ -z "$TELEGRAM_CHAT_ID" ]   && MISSING="$MISSING TELEGRAM_CHAT_ID"
          [ -z "$FRED_API_KEY" ]       && MISSING="$MISSING FRED_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Fehlende Secrets:$MISSING"
            echo "Fehlende Secrets:$MISSING" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Alle 3 Secrets gesetzt."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}

      # ── 2. Code holen ──
      - name: Repository auschecken
        uses: actions/checkout@v4

      # ── 3. Python einrichten mit Cache ──
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 4. Abhängigkeiten ──
      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      # ── 5. Morning Brief mit Retry (bis zu 3 Versuche) ──
      - name: Morning Brief senden
        id: send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
        run: |
          MAX_RETRIES=3
          DELAY=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Versuch $i / $MAX_RETRIES ---"
            if python eurusd_morning_brief.py; then
              echo "✅ Morning Brief erfolgreich gesendet (Versuch $i)"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⚠️ Fehler bei Versuch $i. Warte ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))  # Exponentielles Backoff: 30s, 60s
            fi
          done
          echo "::error::Morning Brief nach $MAX_RETRIES Versuchen fehlgeschlagen"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1

      # ── 6. Job-Summary (immer sichtbar im Actions-Tab) ──
      - name: Job Summary schreiben
        if: always()
        run: |
          STATUS="${{ steps.send.outputs.status }}"
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "## 📊 EUR/USD Morning Brief" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ausführung:** \`$NOW\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$STATUS" = "success" ]; then
            echo "✅ **Erfolgreich gesendet**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Fehlgeschlagen** – bitte Logs prüfen" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quellen" >> $GITHUB_STEP_SUMMARY
          echo "| Datenpunkt | API | Endpoint |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| EZB DFR | ECB SDMX | FM/B.U2.EUR.4F.KR.DFR.LEV |" >> $GITHUB_STEP_SUMMARY
          echo "| HICP | Eurostat Flash | prc_hicp_manr |" >> $GITHUB_STEP_SUMMARY
          echo "| EFFR / US CPI / US2Y | FRED | DFF / CPIAUCSL_PC1 / DGS2 |" >> $GITHUB_STEP_SUMMARY
          echo "| DE 2Y | ECB SDMX | YC/.../SR_2Y |" >> $GITHUB_STEP_SUMMARY
          echo "| COT EUR | CFTC TFF | jun7-3zbs / 099741 |" >> $GITHUB_STEP_SUMMARY
