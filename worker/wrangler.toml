name = "eurusd-morning-brief"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 5 * * *",   # 05:00 UTC täglich – Morning Brief
  "0 16 * * 1",  # 16:00 UTC jeden Montag – COT-Nachhol-Run (US-Feiertage verschieben CFTC-Release auf Mo 15:30 UTC)
]

# Secrets werden NICHT in dieser Datei gespeichert.
# Einrichten mit:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put FRED_API_KEY

[observability]
enabled = true
